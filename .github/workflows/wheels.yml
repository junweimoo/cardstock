name: wheels

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build_wheels:
    name: wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-*"
          CIBW_SKIP: "*-musllinux*"
          # Linux: install native deps inside the manylinux container
          CIBW_BEFORE_ALL_LINUX: "yum install -y libpng-devel freetype-devel harfbuzz-devel || apt-get update && apt-get install -y libpng-dev libfreetype6-dev libharfbuzz-dev"
          CIBW_TEST_REQUIRES: pytest
          CIBW_TEST_COMMAND: "pytest {project}/tests"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
